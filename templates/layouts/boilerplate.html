<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>{{ title | default('voxMate') }}</title>
        
        <!-- Google fonts - Ubuntu -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400;1,700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
        
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}" />

        <!-- BoilerPlate css -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/boilerplate.css') }}" />

        <!-- Custom CSS -->
        {% block head_content %} {% endblock %}
    
    </head>
    
    <body>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="container-fluid mt-2">
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block main_content %} {% endblock %}

        
        <!-- Bootstrap JavaScript -->
        <script src="{{ url_for('static', filename='java/bootstrap.bundle.min.js') }}"></script>

        <!-- Custom JavaScript -->
        {% block script_content %} {% endblock %}
   
    </body>
    
</html>
