services:

  horse-racing-game:
    image: ghcr.io/hutchybop/horse-racing-game:latest
    container_name: horse-racing-game
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3008/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - npm_network

  horse-racing-worker:
    image: ghcr.io/hutchybop/horse-racing-game:latest
    container_name: horse-racing-worker
    restart: unless-stopped
    command: python -m jobs.runner
    env_file:
      - .env
    environment:
      ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - npm_network

networks:
  npm_network:
    external: true
