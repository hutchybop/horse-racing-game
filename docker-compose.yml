version: "3.9"

services:
  web:
    build: .
    command: gunicorn -w 3 -b 0.0.0.0:3008 "web:create_app()"
    env_file:
      - .env
    environment:
      ENV: production
      MONGODB_URI: ${MONGODB_URI}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-devsecret}
      API_KEY_1: ${API_KEY_1:-}
    ports:
      - "3008:3008"
    depends_on:
      - mongo

  worker:
    build: .
    command: python -m jobs.runner
    env_file:
      - .env
    environment:
      ENV: production
      MONGODB_URI: ${MONGODB_URI}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_KEY_1: ${API_KEY_1:-}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
